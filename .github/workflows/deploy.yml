name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "requirements.txt"
      - ".bedrock_agentcore.yaml"
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

permissions:
  id-token: write  # required for OIDC
  contents: read

jobs:
  deploy:
    name: Deploy to AgentCore
    runs-on: ubuntu-latest
    env:
      MODEL_ID: ${{ secrets.MODEL_ID }}
      MEMORY_ID: ${{ secrets.MEMORY_ID }}
      AWS_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install uv (required by agentcore direct_code_deploy)
        run: pip install uv

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy agent
        run: |
          agentcore deploy --auto-update-on-conflict \
            --env MODEL_ID=${{ secrets.MODEL_ID }} \
            --env MEMORY_ID=${{ secrets.MEMORY_ID }}

      - name: Smoke test
        run: |
          agentcore invoke '{"news": "ממשלת ישראל אישרה תקציב חדש", "actor_id": "smoke-test", "session_id": "smoke-1"}' > /tmp/invoke_output.txt 2>&1
          cat /tmp/invoke_output.txt
          # Extract the JSON line (starts with '{')
          JSON=$(grep '^{' /tmp/invoke_output.txt | tail -1)
          echo "$JSON" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'result' in data, f'Missing result key: {data}'
          assert len(data['result']) > 0, 'Empty result'
          print('Smoke test passed')
          "
